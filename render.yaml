# render.yaml - Render Blueprint for automatic deployment
# Docs: https://render.com/docs/blueprint-spec
# Note: VS Code may show warnings - these are safe to ignore. The file follows Render's blueprint spec.

services:
  # Backend API Service
  - type: web
    name: medicaltracker-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false # Set to your frontend URL after deployment
      - key: ALLOWED_ORIGINS
        sync: false # Set to your frontend URL
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@pulseconnect.health
      - key: GEMINI_API_KEY
        sync: false
      - key: REFILL_THRESHOLD
        value: 5

  # Frontend Static Site
  - type: web
    name: medicaltracker-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false # Set to your backend URL after deployment
